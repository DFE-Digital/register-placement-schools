# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0-standalone-strict/ingress-networking-v1.json
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: register-of-placement-schools.education.gov.uk
spec:
  ingressClassName: nginx
  rules:
  - host: register-of-placement-schools.education.gov.uk
    http:
      paths:
      - pathType: ImplementationSpecific
        backend:
          service:
            name: register-of-placement-schools-maintenance
            port:
              number: 80
